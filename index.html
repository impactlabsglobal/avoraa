<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Avoraa Fit — Shop</title>
  <style>
    :root{--ink:#171716;--paper:#f7f7f3;--line:#d9d9d1;--lime:#d9ff28;--muted:#77776f}
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font:14px Arial,sans-serif} button{font:inherit;cursor:pointer}
    .top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:16px 5vw;border-bottom:1px solid var(--line);background:rgba(247,247,243,.95)}
    .brand{font-weight:800;letter-spacing:-.04em;font-size:20px}.top small{color:var(--muted);font-size:10px;letter-spacing:.1em;text-transform:uppercase}.bag{border:1px solid var(--ink);background:transparent;border-radius:99px;padding:9px 13px}
    main{max-width:1180px;margin:auto;padding:34px 5vw 70px}.intro{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:24px}.intro h1{font-size:clamp(34px,6vw,70px);line-height:.92;letter-spacing:-.07em;margin:0;max-width:560px}.intro p{color:var(--muted);max-width:250px;line-height:1.5;margin:0}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.card{min-width:0}.photo{aspect-ratio:1/1.08;background:#e9e9e2;overflow:hidden;position:relative}.photo img{width:100%;height:100%;object-fit:cover;display:block}.tag{position:absolute;z-index:1;left:10px;top:10px;background:var(--lime);padding:8px 10px;font-size:10px;font-weight:bold;letter-spacing:.06em}.info{padding:11px 0;border-bottom:1px solid var(--line)}.row{display:flex;justify-content:space-between;gap:8px}.name{font-weight:bold}.price{font-size:12px}.desc{color:var(--muted);font-size:11px;margin:5px 0 12px}.choose{border:0;border-bottom:1px solid var(--ink);background:transparent;padding:0 0 5px;font-size:11px;text-transform:uppercase;letter-spacing:.08em}
    footer{border-top:1px solid var(--line);padding:24px 5vw;display:flex;justify-content:space-between;gap:20px;color:var(--muted);font-size:12px}footer a{color:var(--ink);text-decoration:none;margin-left:16px}
    .shade{display:none;position:fixed;inset:0;background:#0006;z-index:10}.drawer{position:absolute;right:0;top:0;height:100%;width:min(390px,92vw);background:var(--paper);padding:24px;overflow:auto}.shade.open{display:block}.drawer h2{margin:0 0 24px}.close{float:right;border:0;background:none;font-size:24px}.choice{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0}.size{border:1px solid var(--line);background:transparent;padding:10px 14px}.size.selected{border-color:var(--ink);background:var(--ink);color:#fff}.add{width:100%;background:var(--ink);color:#fff;border:0;padding:14px;margin-top:12px}.checkout{display:block;text-align:center;background:var(--lime);color:var(--ink);text-decoration:none;padding:14px;margin-top:14px}.demo-note{background:#ecece4;padding:10px;font-size:11px;line-height:1.4;margin:0 0 16px}.payment-form{display:grid;gap:10px}.payment-form label{font-size:10px;text-transform:uppercase;letter-spacing:.06em}.payment-form input{display:block;width:100%;border:1px solid var(--line);background:#fff;padding:12px;margin-top:5px}.payment-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pay-button{width:100%;background:var(--ink);color:#fff;border:0;padding:14px;margin-top:5px}.success{padding:18px 0}.success strong{display:block;font-size:20px;margin-bottom:8px}.summary{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 0;margin:16px 0;font-size:12px}.summary div{display:flex;justify-content:space-between;padding:4px 0}.summary .total{font-size:14px;font-weight:bold;padding-top:8px}
    @media(max-width:700px){.top{padding:13px 16px}.top small{display:none}main{padding:25px 16px 50px}.intro{display:block}.intro h1{font-size:43px;margin-bottom:14px}.intro p{font-size:12px}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 10px}.photo{aspect-ratio:1/1.16}.tag{font-size:8px;padding:6px 7px;left:7px;top:7px}.info{padding-top:8px}.name{font-size:12px}.price{font-size:11px}.desc{font-size:10px;margin:4px 0 9px}.choose{font-size:9px}footer{display:block;padding:22px 16px}footer nav{margin-top:14px}footer a{margin:0 16px 0 0}}
  </style>
</head>
<body>
  <header class="top"><div class="brand">avoraa</div><small>Free shipping over $75</small><button class="bag" id="bag">BAG <span id="count">00</span></button></header>
  <main><section class="intro"><h1>Everyday fit.<br><em>Move better.</em></h1><p>Leggings made for training, travel, and every day in between.</p></section><section class="grid" id="grid"></section></main>
  <footer><span>© 2026 Avoraa Fit · Made for movement.</span><nav><a href="https://instagram.com/avoraa.fit" target="_blank">Instagram ↗</a><a href="mailto:hello@avoraa.fit">Contact</a></nav></footer>
  <div class="shade" id="shade"><aside class="drawer"><button class="close" id="close">×</button><h2 id="drawerTitle">Your bag</h2><div id="drawerBody"></div></aside></div>
  <script>
    const products=[
      ['Legging Sculpt','Black / Signature fit','$39.99','BEST SELLER','https://images.unsplash.com/photo-1506629082955-511b1aa562c8?auto=format&fit=crop&w=900&q=85'],
      ['Legging Flex','Rose / Soft compression','$42.99','NEW DROP','https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=900&q=85'],
      ['Licra Motion','Onyx / Light performance','$34.99','EVERYDAY','https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=900&q=85'],
      ['Legging Flow','Sand / Soft support','$44.99','NEW','https://images.unsplash.com/photo-1538805060514-97d9cc17730c?auto=format&fit=crop&w=900&q=85'],
      ['Legging Core','Olive / Everyday fit','$41.99','BEST SELLER','https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=85'],
      ['Legging Ease','Blue / Light stretch','$38.99','EVERYDAY','https://images.unsplash.com/photo-1517832207067-4db24a2ae47c?auto=format&fit=crop&w=900&q=85']
    ];
    let cart=[], selected=null, size='';
    const grid=document.querySelector('#grid'), shade=document.querySelector('#shade'), body=document.querySelector('#drawerBody');
    grid.innerHTML=products.map((p,i)=>`<article class="card"><div class="photo"><img src="${p[4]}" alt="${p[0]}"><span class="tag">${p[3]}</span></div><div class="info"><div class="row"><span class="name">${p[0]}</span><span class="price">${p[2]}</span></div><div class="desc">${p[1]}</div><button class="choose" onclick="openProduct(${i})">Choose size +</button></div></article>`).join('');
    function openProduct(i){selected=products[i];size='';document.querySelector('#drawerTitle').textContent=selected[0];body.innerHTML=`<p>${selected[1]}</p><strong>${selected[2]}</strong><div class="choice">${['XS','S','M','L','XL'].map(x=>`<button class="size" onclick="pick('${x}',this)">${x}</button>`).join('')}</div><button class="add" onclick="addToBag()">Add to bag</button>`;shade.classList.add('open')}
    function pick(x,el){size=x;document.querySelectorAll('.size').forEach(b=>b.classList.remove('selected'));el.classList.add('selected')}
    function addToBag(){if(!size)return alert('Selecciona tu talla');cart.push({name:selected[0],price:selected[2],size});update();showBag()}
    function update(){document.querySelector('#count').textContent=String(cart.length).padStart(2,'0')}
    function totals(){const subtotal=cart.reduce((sum,item)=>sum+Number(item.price.replace('$','')),0);const shipping=subtotal>=75?0:5.99;return {subtotal,shipping,total:subtotal+shipping}}
    function summary(){const t=totals();return `<section class="summary"><div><span>Subtotal</span><span>$${t.subtotal.toFixed(2)}</span></div><div><span>Shipping</span><span>${t.shipping?'$'+t.shipping.toFixed(2):'Free'}</span></div><div class="total"><span>Total</span><span>$${t.total.toFixed(2)}</span></div><div><span>Avoraa points</span><span>+${Math.round(t.subtotal)}</span></div></section>`}
    function showBag(){document.querySelector('#drawerTitle').textContent='Your bag';body.innerHTML=cart.length?cart.map(x=>`<p><strong>${x.name}</strong><br><small>Size ${x.size} · ${x.price}</small></p>`).join('')+summary()+'<button class="checkout" onclick="showPayment()">Continue to checkout</button>':'<p>Your bag is empty.</p>';shade.classList.add('open')}
    function showPayment(){const t=totals();document.querySelector('#drawerTitle').textContent='Checkout';body.innerHTML=`<p class="demo-note"><strong>Demo checkout</strong><br>Esta tarjeta es solo una muestra. No se procesa ningún pago real.</p>${summary()}<form class="payment-form" onsubmit="demoPay(event)"><label>Nombre en la tarjeta<input required placeholder="Alex Johnson"></label><label>Número de tarjeta<input required inputmode="numeric" maxlength="19" placeholder="4242 4242 4242 4242"></label><div class="payment-row"><label>Vencimiento<input required placeholder="12 / 30"></label><label>CVV<input required inputmode="numeric" maxlength="4" placeholder="123"></label></div><label>Dirección de envío<input required placeholder="123 Main Street, Miami FL"></label><button class="pay-button" type="submit">Pay $${t.total.toFixed(2)} — Demo</button></form>`}
    function demoPay(event){event.preventDefault();body.innerHTML='<div class="success"><strong>Demo order complete ✓</strong><p>Así verá el cliente la confirmación. No se realizó ningún cobro.</p><button class="checkout" onclick="shade.classList.remove(\'open\')">Back to shop</button></div>'}
    document.querySelector('#bag').onclick=showBag;document.querySelector('#close').onclick=()=>shade.classList.remove('open');shade.onclick=e=>{if(e.target===shade)shade.classList.remove('open')};
  </script>
</body></html>
